<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobrevivência na Ilha - Mapa Real</title>
    <style>
        :root {
            --mar: #3498db; --grama: #2ecc71; --areia: #f1c40f;
            --grama-escura: #27ae60; --borda: #2c3e50;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #dfe6e9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .game-layout { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

        /* Estilo do Grid */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(9, 50px); 
            grid-template-rows: repeat(9, 50px);
            gap: 1px; background: #95a5a6; border: 5px solid var(--borda);
        }
        
        .cell { 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; cursor: pointer; position: relative; transition: 0.2s;
        }

        /* Cores do Terreno baseado na Imagem 3 */
        .M { background-color: var(--mar); }        /* Mar */
        .A { background-color: var(--areia); }      /* Areia */
        .G { background-color: var(--grama); }      /* Grama Clara */
        .GE { background-color: var(--grama-escura); } /* Grama Escura/Ilha */

        /* Marcador de Item do Jogador */
        .item-player { 
            color: white; font-weight: bold; text-shadow: 1px 1px 2px black;
            background: rgba(0,0,0,0.3); border-radius: 50%; width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center; z-index: 5;
        }

        .sidebar { width: 300px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 15px; }
        .btn-item { padding: 10px; border: 2px solid var(--borda); cursor: pointer; font-weight: bold; }
        .btn-item.active { background: var(--borda); color: white; }
    </style>
</head>
<body>

    <h1>🏝️ Mapa de Sobrevivência</h1>

    <div class="game-layout">
        <div id="grid"></div>

        <div class="sidebar">
            <h3>Recursos para Alocar:</h3>
            <div class="controls" id="item-selector"></div>
            <hr>
            <p id="info-item" style="font-size: 0.85rem; color: #666; height: 40px;"></p>
            <button onclick="window.location.reload()" style="width:100%">Resetar Mapa</button>
        </div>
    </div>

    <script>
        // LEGENDA DO MAPA:
        // M: Mar, A: Areia, G: Grama, GE: Grama Escura
        // Objetos: 🌵: Cacto, 🏠: Casa, 🪵: Tronco, 🐗: Javali, 🦈: Tubarão, 🌳: Árvore, 🌿: Arbusto, 🪨: Rocha
        
        const mapaDesign = [
            ['M','M','M','M','🪨','M','M','M','M'],
            ['M','M','M','M','M','M','A','🌵','A'],
            ['M','M','🏠','M','M','🌵','A','A','A'],
            ['M','M','M','M','🪵','M','A','🌵','A'],
            ['🪵','🪨','M','M','🐗','M','M','M','M'],
            ['M','M','M','M','M','M','🪵','M','M'],
            ['🏠','M','M','🌿','🦈','M','🪨','M','🌳'],
            ['🪨','M','M','M','M','M','🌳','M','M'],
            ['M','🏠','M','M','M','M','M','🌳','M']
        ];

        // Definindo as cores de fundo para cada célula (ajustado para o desenho da imagem)
        const mapaCores = [
            ['M','M','M','M','M','M','A','A','A'],
            ['M','M','M','M','M','M','A','A','A'],
            ['M','M','G','M','M','M','A','A','A'],
            ['M','M','G','M','M','M','M','M','M'],
            ['G','G','G','G','G','M','M','M','M'],
            ['G','G','G','G','G','M','M','M','M'],
            ['G','G','G','G','M','G','G','G','G'],
            ['G','G','G','G','M','G','G','G','G'],
            ['G','G','G','G','M','G','G','G','G']
        ];

        let itemAtual = 'A';
        const infoItens = {
            'A': 'Rede de Pesca (Deve estar na CASA)',
            'B': 'Medicamento (Deve estar no TRONCO)',
            'C': 'Sinalizador (Deve estar na ÁRVORE)',
            'D': 'Repelente (Ao lado do mesmo tipo de objeto do alimento)',
            'E': 'Água Potável (Ao lado de um JAVALI)',
            'F': 'Isqueiro (Ao lado de um ARBUSTO)',
            'G': 'Protetor (Coluna 5)',
            'H': 'Alimentação (Ilha com 3 recursos)',
            'I': 'Ponto de Resgate (Último espaço)'
        };

        const grid = document.getElementById('grid');
        const selector = document.getElementById('item-selector');
        const infoBox = document.getElementById('info-item');

        // Criar botões
        Object.keys(infoItens).forEach(letra => {
            const btn = document.createElement('button');
            btn.className = 'btn-item' + (letra === 'A' ? ' active' : '');
            btn.innerText = letra;
            btn.onclick = () => {
                document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                itemAtual = letra;
                infoBox.innerText = infoItens[letra];
            };
            selector.appendChild(btn);
        });

        // Construir o Grid
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                const cell = document.createElement('div');
                const conteudo = mapaDesign[r][c];
                const cor = mapaCores[r][c];
                
                cell.className = `cell ${cor}`;
                cell.innerHTML = (conteudo !== cor) ? conteudo : ''; // Coloca o emoji se não for apenas cor
                
                cell.onclick = () => {
                    // Remover item se já estiver no mapa
                    document.querySelectorAll('.item-player').forEach(p => {
                        if(p.innerText === itemAtual) p.remove();
                    });

                    // Adicionar novo
                    const marker = document.createElement('div');
                    marker.className = 'item-player';
                    marker.innerText = itemAtual;
                    cell.appendChild(marker);
                };
                
                grid.appendChild(cell);
            }
        }
        infoBox.innerText = infoItens['A'];
    </script>
</body>
</html>
