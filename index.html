<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobrevivência — Ajuste de Cactos</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #eed7a1;
    --grass: #568c4a;
    --sea: #2a8cc2;
    --gold: #f0c040;
    --correct: #5dbb6a;
    --wrong: #e05252;
    --text: #f0e8d0;
    --bg: #0a263a;
  }

  body {
    font-family: 'Crimson Pro', serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header { text-align: center; margin-bottom: 20px; }
  h1 { font-family: 'Cinzel Decorative', cursive; color: var(--gold); margin: 0; }

  .game-container {
    display: flex;
    gap: 30px;
    max-width: 1100px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .items-panel {
    width: 320px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .item-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }
  .item-card:hover { background: rgba(255,255,255,0.15); }
  .item-card.selected { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
  .item-card.placed { opacity: 0.4; pointer-events: none; border-color: var(--correct); }

  .map-wrapper { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; }
  .grid { border-collapse: collapse; }
  .cell {
    width: 45px;
    height: 45px;
    border: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    font-size: 1.2rem;
    cursor: pointer;
    position: relative;
  }

  .sand { background-color: var(--sand); color: #5d4a1e; }
  .grass { background-color: var(--grass); }
  .sea { background-color: var(--sea); }

  .cell.blocked::after { content: "×"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(0,0,0,0.2); font-size: 2rem; }
  .cell.user-choice { background: rgba(240,192,64,0.6) !important; font-weight: bold; color: white; border: 2px solid var(--gold); }
  .cell.correct { background: var(--correct) !important; }
  .cell.wrong { background: var(--wrong) !important; }

  .controls { margin-top: 20px; display: flex; gap: 15px; }
  button {
    padding: 12px 24px;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-check { background: var(--gold); color: #000; }
  .btn-reset { background: #555; color: #fff; }
  
  #msg { margin-top: 15px; font-weight: bold; font-size: 1.1rem; min-height: 1.5em; }
</style>
</head>
<body>

<header>
  <h1>🏝️ SOBREVIVÊNCIA: MAT</h1>
  <p>Localize os suprimentos. Regra: Um por linha e um por coluna.</p>
</header>

<div class="game-container">
  <div class="items-panel" id="itemsPanel"></div>
  
  <div class="map-wrapper">
    <table class="grid" id="mapGrid"></table>
    <div class="controls">
      <button class="btn-check" onclick="verify()">Verificar Mapa</button>
      <button class="btn-reset" onclick="resetGame()">Reiniciar</button>
    </div>
    <div id="msg"></div>
  </div>
</div>

<script>

const SAND = ['1,1','2,1','1,2','2,2','3,2','1,3','2,3','3,3','1,4','2,4'];
const GRASS = [
  '1,6','1,7','2,7','3,7','4,7','1,8','2,8','3,8','4,8','1,9','2,9','3,9','4,9',
  '4,5','5,2','6,2','7,2','5,3','6,3','7,3','8,3','5,4','6,4','7,4','8,4',
  '5,5','6,5','9,6','7,5','6,7','7,7','8,7','9,7','6,8','7,8','8,8','8,9',
  '6,9','7,9','9,8','9,9'
];


const OBSTACLES = {
  '1,3':'🌵', '2,1':'🌵', '3,2':'🌵', 
  '2,6':'🪵', '4,4':'🪵', '9,3':'🪵', 
  '3,7':'🪨', '4,1':'🪨', '8,3':'🪨', '9,8':'🪨', 
  '1,7':'🌳', '2,9':'🌳', '3,8':'🌳', 
  '5,2':'🏠', '8,9':'🏠', '9,6':'🏠', 
  '6,7':'🌿', '7,4':'🌿', 
  '5,5':'🐗', 
  '5,7':'🦈', '9,5':'🦈' 
};

const NON_WALKABLE = ['🌵','🪨','🌳','🌿','🐗','🦈'];

const ITEMS = [
  { id:'A', name:'Rede de Pesca', hint:'Estava numa casa', icon:'🕸️' },
  { id:'B', name:'Medicamento', hint:'Estava em um tronco', icon:'💊' },
  { id:'C', name:'Sinalizador', hint:'Ilha das árvores', icon:'🔦' },
  { id:'D', name:'Repelente', hint:'Lado do mesmo tipo que alimentos', icon:'🧴' },
  { id:'E', name:'Água Potável', hint:'Ao lado de um animal (Javali)', icon:'💧' },
  { id:'F', name:'Isqueiro', hint:'Ao lado de um arbusto', icon:'🔥' },
  { id:'G', name:'Protetor', hint:'Na quinta coluna', icon:'☀️' },
  { id:'H', name:'Alimentação', hint:'Ilha com três outros', icon:'🍱' },
  { id:'I', name:'Ponto de Resgate', hint:'O último espaço disponível', icon:'🚩' }
];


const SOLUTIONS = {
  'C':'1,8', 'B':'2,6', 'I':'3,1', 'G':'4,5',
  'E':'5,4', 'H':'6,2', 'F':'7,3', 'A':'8,9', 'D':'9,7'
};

let selectedId = null;
let placements = {};

function init() {
  renderItems();
  renderMap();
}

function renderItems() {
  const panel = document.getElementById('itemsPanel');
  panel.innerHTML = ITEMS.map(item => `
    <div class="item-card ${selectedId === item.id ? 'selected' : ''} ${placements[item.id] ? 'placed' : ''}" 
         onclick="selectItem('${item.id}')">
      <strong>${item.id}. ${item.name}</strong><br>
      <small>${item.icon} ${item.hint}</small>
    </div>
  `).join('');
}

function selectItem(id) {
  selectedId = (selectedId === id) ? null : id;
  renderItems();
}

function renderMap() {
  const grid = document.getElementById('mapGrid');
  grid.innerHTML = '';
  const usedRows = Object.values(placements).map(p => parseInt(p.split(',')[0]));
  const usedCols = Object.values(placements).map(p => parseInt(p.split(',')[1]));

  for (let r = 1; r <= 9; r++) {
    const tr = document.createElement('tr');
    for (let c = 1; c <= 9; c++) {
      const td = document.createElement('td');
      const coord = `${r},${c}`;
      const obj = OBSTACLES[coord];
      
      if (SAND.includes(coord)) td.className = 'cell sand';
      else if (GRASS.includes(coord)) td.className = 'cell grass';
      else td.className = 'cell sea';

      const occupant = Object.keys(placements).find(key => placements[key] === coord);
      if (occupant) {
        td.classList.add('user-choice');
        td.innerText = occupant;
      } else if (obj) {
        td.innerText = obj;
      }

      if (!occupant && (usedRows.includes(r) || usedCols.includes(c))) {
        td.classList.add('blocked');
      }

      td.onclick = () => placeItem(r, c, obj);
      tr.appendChild(td);
    }
    grid.appendChild(tr);
  }
}

function placeItem(r, c, obj) {
  if (!selectedId) return;
  const coord = `${r},${c}`;

  if (obj && NON_WALKABLE.includes(obj)) {
    document.getElementById('msg').innerText = "❌ Local proibido!";
    return;
  }

  const usedRows = Object.values(placements).map(p => parseInt(p.split(',')[0]));
  const usedCols = Object.values(placements).map(p => parseInt(p.split(',')[1]));

  if (usedRows.includes(r) || usedCols.includes(c)) {
    document.getElementById('msg').innerText = "❌ Apenas um por linha e coluna!";
    return;
  }

  placements[selectedId] = coord;
  selectedId = null;
  document.getElementById('msg').innerText = "";
  renderItems();
  renderMap();
}

function verify() {
  if (Object.keys(placements).length < 9) {
    document.getElementById('msg').innerText = "⚠️ Posicione todos os 9 suprimentos.";
    return;
  }

  let hits = 0;
  const cells = document.querySelectorAll('.cell');
  Object.keys(placements).forEach(id => {
    const [r, c] = placements[id].split(',').map(Number);
    const cellIdx = (r - 1) * 9 + (c - 1);
    const cell = cells[cellIdx];
    
    if (placements[id] === SOLUTIONS[id]) {
      cell.classList.add('correct');
      hits++;
    } else {
      cell.classList.add('wrong');
    }
  });

  if (hits === 9) {
    document.getElementById('msg').style.color = "var(--correct)";
    document.getElementById('msg').innerText = "🏆 Sucesso! Sobrevivência garantida!";
  } else {
    document.getElementById('msg').style.color = "var(--wrong)";
    document.getElementById('msg').innerText = `❌ Erros detetados. Tente novamente!`;
  }
}

function resetGame() {
  placements = {};
  selectedId = null;
  document.getElementById('msg').innerText = "";
  init();
}

init();
</script>
</body>
</html>
