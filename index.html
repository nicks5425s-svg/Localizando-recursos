<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio de Sobrevivência - Mapa Fiel</title>
    <style>
        :root {
            --mar: #2980b9; --grama: #27ae60; --areia: #f1c40f; --borda: #2c3e50;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #ecf0f1; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        
        /* Layout Principal */
        .game-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

        /* Grid de 9x9 */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(9, 45px); 
            grid-template-rows: repeat(9, 45px);
            gap: 1px; background: #7f8c8d; border: 4px solid var(--borda);
        }
        
        .cell { 
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; 
            font-size: 1.4rem; cursor: pointer; position: relative;
        }

        /* Cores de Fundo baseadas na imagem */
        .M { background-color: var(--mar); }   /* Mar */
        .A { background-color: var(--areia); } /* Areia */
        .G { background-color: var(--grama); } /* Grama */

        /* Itens do jogador */
        .player-token {
            position: absolute; width: 32px; height: 32px; background: rgba(255,255,255,0.9);
            border: 2px solid #e74c3c; color: #c0392b; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1rem; z-index: 10; pointer-events: none;
        }

        .sidebar { width: 300px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .item-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
        .btn-item { padding: 10px; border: 2px solid var(--borda); cursor: pointer; font-weight: bold; background: white; }
        .btn-item.active { background: var(--borda); color: white; }
        .legend { font-size: 0.8rem; line-height: 1.4; color: #555; }
    </style>
</head>
<body>

    <h1>🏝️ Ilha de Sobrevivência</h1>

    <div class="game-container">
        <div>
            <div id="grid"></div>
            <p style="text-align: center; color: #7f8c8d;">Colunas: 1 a 9</p>
        </div>

        <div class="sidebar">
            <strong>Selecione o Recurso:</strong>
            <div class="item-list" id="selector"></div>
            
            <div class="legend" id="dica-box">
                <p><i>Selecione uma letra para ver a dica.</i></p>
            </div>
            <hr>
            <button onclick="window.location.reload()" style="width:100%; padding: 8px; cursor:pointer;">Reiniciar Mapa</button>
        </div>
    </div>

    <script>
        // Mapeamento idêntico à imagem (Linha x Coluna)
        // M: Mar, A: Areia, G: Grama
        const terrenos = [
            ['A','A','A','M','M','M','M','M','M'],
            ['A','A','A','M','G','G','G','M','M'],
            ['A','A','A','M','G','G','G','G','G'],
            ['M','M','M','M','G','G','G','G','G'],
            ['M','M','M','G','G','G','G','G','G'],
            ['M','M','M','M','M','M','G','G','G'],
            ['M','G','G','M','G','G','G','G','G'],
            ['M','G','G','M','G','G','G','G','G'],
            ['M','G','G','M','G','G','G','G','G']
        ];

        // Emojis fixos do cenário conforme a imagem
        const objetos = {
            '0-0':'🌵', '1-1':'🌵', '2-2':'🌵', // Cactos na areia
            '0-3':'🪨', '4-1':'🪨', '6-0':'🪨', '7-7':'🪨', // Rochas (Whales/Rocks)
            '1-4':'🏠', '5-0':'🏠', '8-1':'🏠', // Casas
            '4-3':'🪵', '5-7':'🪵', '8-0':'🪵', // Troncos
            '4-4':'🐗', // Javali
            '3-6':'🌿', '6-3':'🌿', // Arbustos
            '4-8':'🦈', '6-4':'🦈', // Tubarões
            '6-8':'🌳', '7-6':'🌳', '8-7':'🌳' // Árvores
        };

        const dicas = {
            'A': 'Rede de Pesca: Estava numa CASA.',
            'B': 'Medicamento: Estava em um TRONCO.',
            'C': 'Sinalizador: Estava na ILHA DAS ÁRVORES.',
            'D': 'Repelente: Ao lado do mesmo objeto do Alimento.',
            'E': 'Água Potável: Ao lado de um JAVALI.',
            'F': 'Isqueiro: Ao lado de um ARBUSTO.',
            'G': 'Protetor: Estava na QUINTA COLUNA.',
            'H': 'Alimentação: Numa ilha com 3 outros recursos.',
            'I': 'Ponto de Resgate: Último espaço disponível.'
        };

        let selecionado = 'A';
        const grid = document.getElementById('grid');
        const selector = document.getElementById('selector');
        const dicaBox = document.getElementById('dica-box');

        // Gerar Botões
        Object.keys(dicas).forEach(letra => {
            const btn = document.createElement('button');
            btn.className = 'btn-item' + (letra === 'A' ? ' active' : '');
            btn.innerText = letra;
            btn.onclick = () => {
                document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selecionado = letra;
                dicaBox.innerHTML = `<strong>Dica ${letra}:</strong><br>${dicas[letra]}`;
            };
            selector.appendChild(btn);
        });

        // Gerar Grid
        for(let r=0; r<9; r++) {
            for(let c=0; c<9; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${terrenos[r][c]}`;
                
                const obj = objetos[`${r}-${c}`];
                if(obj) cell.innerText = obj;

                cell.onclick = () => {
                    // Remove o item se ele já existir no mapa
                    document.querySelectorAll('.player-token').forEach(t => {
                        if(t.innerText === selecionado) t.remove();
                    });

                    // Adiciona o item à célula clicada
                    const token = document.createElement('div');
                    token.className = 'player-token';
                    token.innerText = selecionado;
                    cell.appendChild(token);
                };
                grid.appendChild(cell);
            }
        }
    </script>
</body>
</html>
